<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BFHL Tree Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
    h1 { text-align: center; font-size: 1.8rem; margin-bottom: 0.3rem; color: #38bdf8; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }
    .card { background: #1e293b; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #334155; }
    textarea { width: 100%; height: 120px; background: #0f172a; border: 1px solid #475569; border-radius: 8px;
      color: #e2e8f0; font-size: 0.95rem; padding: 0.8rem; resize: vertical; outline: none; }
    textarea:focus { border-color: #38bdf8; }
    button { background: #0ea5e9; color: white; border: none; padding: 0.7rem 2rem;
      border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 1rem; transition: background 0.2s; }
    button:hover { background: #0284c7; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .error { background: #450a0a; border: 1px solid #dc2626; color: #fca5a5; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
    .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 0.75rem; }
    .tree-card { background: #0f172a; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; border-left: 3px solid #38bdf8; }
    .tree-card.cycle { border-left-color: #f59e0b; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 99px; font-size: 0.75rem; margin-left: 0.5rem; }
    .badge-cycle { background: #451a03; color: #fcd34d; }
    .badge-tree { background: #042f2e; color: #34d399; }
    .root-label { font-size: 1.1rem; font-weight: 600; color: #e2e8f0; }
    .depth { color: #94a3b8; font-size: 0.85rem; margin-top: 0.3rem; }
    pre { background: #0f172a; padding: 0.75rem; border-radius: 6px; font-size: 0.8rem;
      color: #7dd3fc; overflow-x: auto; margin-top: 0.5rem; border: 1px solid #1e3a5f; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.4rem; }
    .tag { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 0.2rem 0.6rem; font-size: 0.8rem; font-family: monospace; }
    .tag.invalid { border-color: #dc2626; color: #fca5a5; }
    .tag.dup { border-color: #d97706; color: #fcd34d; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .summary-item { background: #0f172a; border-radius: 8px; padding: 1rem; text-align: center; }
    .summary-num { font-size: 2rem; font-weight: 700; color: #38bdf8; }
    .summary-label { font-size: 0.75rem; color: #64748b; margin-top: 0.3rem; }
    .hint { color: #475569; font-size: 0.82rem; margin-top: 0.5rem; }
    #output { display: none; }
  </style>
</head>
<body>
  <h1>🌲 BFHL Tree Analyzer</h1>
  <p class="subtitle">Submit node edges and explore hierarchical structures</p>

  <div class="card">
    <div class="section-title">Node Edges Input</div>
    <textarea id="inputField" placeholder='Enter edges separated by commas or newlines, e.g.&#10;A->B, A->C, B->D, X->Y, Y->Z, Z->X'></textarea>
    <p class="hint">Format: X->Y where X and Y are single uppercase letters (A–Z)</p>
    <button id="submitBtn" onclick="submitData()">Analyze Hierarchy</button>
  </div>

  <div id="errorBox" style="display:none"></div>
  <div id="output">
    <div class="card" id="summarySection">
      <div class="section-title">Summary</div>
      <div class="summary-grid" id="summaryGrid"></div>
    </div>
    <div class="card" id="hierarchySection">
      <div class="section-title">Hierarchies</div>
      <div id="hierarchyList"></div>
    </div>
    <div class="card" id="flagsSection">
      <div class="section-title">Invalid Entries</div>
      <div class="tag-list" id="invalidList"></div>
      <div class="section-title" style="margin-top:1rem">Duplicate Edges</div>
      <div class="tag-list" id="dupList"></div>
    </div>
  </div>

  <script>
    async function submitData() {
      const raw = document.getElementById('inputField').value.trim();
      const errBox = document.getElementById('errorBox');
      errBox.style.display = 'none';
      document.getElementById('output').style.display = 'none';

      if (!raw) { showError('Please enter at least one edge.'); return; }

      // Parse: split by comma or newline
      const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Analyzing...';

      try {
        const res = await fetch('/bfhl', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data })
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const json = await res.json();
        renderOutput(json);
      } catch (e) {
        showError('API call failed: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyze Hierarchy';
      }
    }

    function showError(msg) {
      const b = document.getElementById('errorBox');
      b.innerHTML = `<div class="error">⚠️ ${msg}</div>`;
      b.style.display = 'block';
    }

    function renderOutput(json) {
      // Summary
      const s = json.summary;
      document.getElementById('summaryGrid').innerHTML = `
        <div class="summary-item"><div class="summary-num">${s.total_trees}</div><div class="summary-label">Valid Trees</div></div>
        <div class="summary-item"><div class="summary-num">${s.total_cycles}</div><div class="summary-label">Cyclic Groups</div></div>
        <div class="summary-item"><div class="summary-num">${s.largest_tree_root ?? '—'}</div><div class="summary-label">Deepest Root</div></div>
      `;

      // Hierarchies
      const hl = document.getElementById('hierarchyList');
      hl.innerHTML = '';
      for (const h of json.hierarchies) {
        const div = document.createElement('div');
        div.className = 'tree-card' + (h.has_cycle ? ' cycle' : '');
        const badge = h.has_cycle
          ? '<span class="badge badge-cycle">⚠ Cycle</span>'
          : '<span class="badge badge-tree">✓ Tree</span>';
        const depthLine = h.depth !== undefined ? `<div class="depth">Depth: ${h.depth} nodes</div>` : '';
        const treePre = !h.has_cycle ? `<pre>${JSON.stringify(h.tree, null, 2)}</pre>` : '';
        div.innerHTML = `<div class="root-label">Root: ${h.root} ${badge}</div>${depthLine}${treePre}`;
        hl.appendChild(div);
      }

      // Invalid & Duplicates
      const il = document.getElementById('invalidList');
      il.innerHTML = json.invalid_entries.length
        ? json.invalid_entries.map(e => `<span class="tag invalid">${e}</span>`).join('')
        : '<span style="color:#475569;font-size:0.85rem">None</span>';

      const dl = document.getElementById('dupList');
      dl.innerHTML = json.duplicate_edges.length
        ? json.duplicate_edges.map(e => `<span class="tag dup">${e}</span>`).join('')
        : '<span style="color:#475569;font-size:0.85rem">None</span>';

      document.getElementById('output').style.display = 'block';
    }
  </script>
</body>
</html>
