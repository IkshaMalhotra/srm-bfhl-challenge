<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tree Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0d0f;
      --surface: #141518;
      --surface-2: #1a1b1f;
      --border: rgba(255,255,255,0.07);
      --border-med: rgba(255,255,255,0.12);
      --text: #e8e9eb;
      --text-dim: #6b7280;
      --text-dimmer: #3d4148;
      --accent: #c8f0a0;      /* soft sage green — not loud */
      --accent-dim: rgba(200,240,160,0.08);
      --accent-border: rgba(200,240,160,0.2);
      --warn: #f0c040;
      --warn-dim: rgba(240,192,64,0.08);
      --warn-border: rgba(240,192,64,0.2);
      --danger: #f07060;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html { font-size: 15px; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      /* subtle grid texture */
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── layout ── */
    .shell {
      max-width: 780px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
    }

    /* ── header ── */
    header {
      margin-bottom: 3.5rem;
    }
    .eyebrow {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .eyebrow::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: var(--accent);
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .tagline {
      margin-top: 0.5rem;
      font-size: 0.88rem;
      color: var(--text-dim);
      font-family: var(--mono);
      font-weight: 300;
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem;
      margin-bottom: 1.25rem;
    }

    .label {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      margin-bottom: 0.85rem;
    }

    /* ── textarea ── */
    textarea {
      width: 100%;
      min-height: 110px;
      background: var(--bg);
      border: 1px solid var(--border-med);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.88rem;
      line-height: 1.6;
      padding: 0.9rem 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-dimmer); }

    .hint {
      margin-top: 0.6rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dimmer);
    }

    /* ── button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.25rem;
      background: var(--accent);
      color: #0c1408;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.5rem;
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: var(--surface-2); color: var(--text-dim); cursor: not-allowed; transform: none; }

    .btn-spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0c1408;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .btn-spinner { display: block; }
    .btn.loading .btn-label { opacity: 0.5; }

    /* ── error ── */
    .err-box {
      display: none;
      background: rgba(240,112,96,0.08);
      border: 1px solid rgba(240,112,96,0.25);
      color: var(--danger);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      font-family: var(--mono);
      font-size: 0.83rem;
      margin-top: 1rem;
    }

    /* ── output section ── */
    #output { display: none; }

    /* ── summary grid ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
    .stat {
      background: var(--surface-2);
      border-radius: 10px;
      padding: 1.1rem 1rem;
      text-align: center;
    }
    .stat-num {
      font-size: 1.9rem;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text);
      letter-spacing: -0.04em;
    }
    .stat-label {
      margin-top: 0.3rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    /* ── tree cards ── */
    .tree-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 0.65rem;
      border-left: 3px solid var(--accent);
    }
    .tree-item.is-cycle {
      border-left-color: var(--warn);
    }

    .tree-head {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .tree-root {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
    }
    .pill {
      font-family: var(--mono);
      font-size: 0.67rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
    }
    .pill-ok { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
    .pill-cycle { background: var(--warn-dim); color: var(--warn); border: 1px solid var(--warn-border); }

    .tree-depth {
      margin-top: 0.35rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    pre {
      margin-top: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 0.9rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: #9bbf77;
      overflow-x: auto;
      line-height: 1.5;
    }

    /* ── tag lists ── */
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }
    .tag {
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 0.2rem 0.6rem;
      border-radius: 5px;
    }
    .tag-bad { background: rgba(240,112,96,0.08); color: var(--danger); border: 1px solid rgba(240,112,96,0.25); }
    .tag-dup { background: var(--warn-dim); color: var(--warn); border: 1px solid var(--warn-border); }

    .empty-note {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-dimmer);
    }

    /* ── divider inside flags card ── */
    .flag-sep {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    /* ── fade-in on result ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.35s ease both; }

    @media (max-width: 520px) {
      h1 { font-size: 1.8rem; }
      .stat-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="eyebrow">Tree Analyzer</div>
    <h1>Node Hierarchy<br>Explorer</h1>
    <p class="tagline">// bfhl · edge-based tree detection</p>
  </header>

  <div class="card">
    <div class="label">Edge Input</div>
    <textarea id="inputField" placeholder="A->B, A->C, B->D&#10;X->Y, Y->Z, Z->X"></textarea>
    <p class="hint">// format: X->Y · uppercase single letters · comma or newline separated</p>
    <div id="errBox" class="err-box"></div>
    <button class="btn" id="submitBtn" onclick="run()">
      <div class="btn-spinner" id="spinner"></div>
      <span class="btn-label">Analyze</span>
    </button>
  </div>

  <div id="output">
    <div class="card fade-up">
      <div class="label">Summary</div>
      <div class="stat-grid" id="statGrid"></div>
    </div>

    <div class="card fade-up">
      <div class="label">Hierarchies</div>
      <div id="treeList"></div>
    </div>

    <div class="card fade-up">
      <div class="label">Invalid Entries</div>
      <div class="tag-row" id="invalidList"></div>
      <hr class="flag-sep">
      <div class="label">Duplicate Edges</div>
      <div class="tag-row" id="dupList"></div>
    </div>
  </div>

</div>

<script>
  async function run() {
    const raw = document.getElementById('inputField').value.trim();
    const errBox = document.getElementById('errBox');
    const btn = document.getElementById('submitBtn');
    const out = document.getElementById('output');

    errBox.style.display = 'none';
    out.style.display = 'none';

    if (!raw) { showErr('Enter at least one edge.'); return; }

    // split on commas or newlines
    const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
    console.log('[tree-analyzer] sending edges:', data);

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch('/bfhl', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data })
      });
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();
      console.log('[tree-analyzer] response:', json);
      render(json);
    } catch (e) {
      showErr('Request failed — ' + e.message);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function showErr(msg) {
    const b = document.getElementById('errBox');
    b.textContent = msg;
    b.style.display = 'block';
  }

  function render(json) {
    const s = json.summary;

    // summary stats
    document.getElementById('statGrid').innerHTML = `
      <div class="stat">
        <div class="stat-num">${s.total_trees}</div>
        <div class="stat-label">Valid Trees</div>
      </div>
      <div class="stat">
        <div class="stat-num">${s.total_cycles}</div>
        <div class="stat-label">Cyclic Groups</div>
      </div>
      <div class="stat">
        <div class="stat-num">${s.largest_tree_root ?? '—'}</div>
        <div class="stat-label">Deepest Root</div>
      </div>
    `;

    // each hierarchy
    const list = document.getElementById('treeList');
    list.innerHTML = '';
    for (const h of json.hierarchies) {
      const div = document.createElement('div');
      div.className = 'tree-item' + (h.has_cycle ? ' is-cycle' : '');

      const badge = h.has_cycle
        ? '<span class="pill pill-cycle">cycle</span>'
        : '<span class="pill pill-ok">tree</span>';

      const depth = h.depth !== undefined
        ? `<div class="tree-depth">depth ${h.depth}</div>` : '';

      const treeJson = !h.has_cycle
        ? `<pre>${JSON.stringify(h.tree, null, 2)}</pre>` : '';

      div.innerHTML = `
        <div class="tree-head">
          <span class="tree-root">${h.root}</span>
          ${badge}
        </div>
        ${depth}
        ${treeJson}
      `;
      list.appendChild(div);
    }

    // invalid & duplicates
    const il = document.getElementById('invalidList');
    il.innerHTML = json.invalid_entries.length
      ? json.invalid_entries.map(e => `<span class="tag tag-bad">${e}</span>`).join('')
      : '<span class="empty-note">none</span>';

    const dl = document.getElementById('dupList');
    dl.innerHTML = json.duplicate_edges.length
      ? json.duplicate_edges.map(e => `<span class="tag tag-dup">${e}</span>`).join('')
      : '<span class="empty-note">none</span>';

    document.getElementById('output').style.display = 'block';
  }
</script>
</body>
</html>
